services:
  # Backend API
  - type: web
    name: representatividade-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        value: dbexp.vcenter.com.br
      - key: DB_PORT
        value: 20168
      - key: DB_NAME
        value: liebe
      - key: DB_USER
        value: liebe_ro
      - key: DB_PASSWORD
        value: "%eTS$33qPO8XZNMc"

  # Frontend Next.js
  - type: web
    name: representatividade-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://representatividade-backend.onrender.com/api
